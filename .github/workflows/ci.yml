# CI: run on push to main and on PRs. Railway auto-deploys on push when repo is connected.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify app loads
        run: python -c "from bot.main import main; print('OK')"
        env:
          BOT_TOKEN: "placeholder-for-ci"
